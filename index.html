<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehman Marketplace</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">🛒 Rehman Store</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#addProduct">Add Product</a></li>
      <li><a href="#allProducts">All Products</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="nav-buttons">
      <button class="login-btn" onclick="openLogin()">Login</button>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </nav>

  <!-- Hero Section -->
  <section id="home">
    <h1>Welcome to Rehman Store</h1>
    <p>Find the best products here!</p>
  </section>

  <!-- About Section -->
  <section id="about">
    <h2>About Us</h2>
    <p>We provide high quality products at best prices.</p>
  </section>

  <!-- Add Product Section -->
  <section id="addProduct">
    <h2>Add Product</h2>
    <input type="text" id="pname" placeholder="Product Name">
    <input type="text" id="pprice" placeholder="Price">
    <input type="text" id="pdesc" placeholder="Description">
    <input type="text" id="pimage" placeholder="Image URL">
    <button onclick="addProduct()">Add Product</button>
  </section>

  <!-- All Products Section (Cards) -->
  <section id="allProducts">
    <h2>All Products</h2>
    <div class="products" id="products">
      <!-- Product cards will appear here -->
    </div>
  </section>

  <!-- Contact Section -->
  <section id="contact">
    <h2>Contact Us</h2>
    <p>Email: info@rehmanstore.com</p>
    <p>Phone: +92 300 1234567</p>
  </section>

  <script type="module" src="app.js"></script>
</body>
